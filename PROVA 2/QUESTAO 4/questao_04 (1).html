<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Questão 04 – Perfil do Jogador</title>

  <!-- Bootstrap 5 via CDN online -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background-image: url(FIFA-World-Cup-26.jpg);
      background-color: #f0f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 360px;
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    .card-header {
      background-color: #1a5c2a;
      color: #ffffff;
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      padding: 16px;
    }

    #foto-jogador {
      width: 100%;
      height: 260px;
      object-fit: cover;
      background-color: #cccccc;
    }

    /* Placeholder: oculta o texto real */
    .placeholder-text {
      background-color: #dee2e6;
      color: #dee2e6;
      border-radius: 4px;
      user-select: none;
    }

    /* card-text: exibe o texto normalmente */
    .card-text {
      color: #222222;
      background-color: transparent;
    }

    .info-label {
      font-weight: bold;
      color: #1a5c2a;
      min-width: 130px;
      display: inline-block;
    }

    .btn-revelar {
      background-color: #1a5c2a;
      color: #ffffff;
      border: none;
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 0 0 16px 16px;
    }

    .btn-revelar:hover {
      background-color: #145222;
      color: #ffffff;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-header">⚽ Perfil do Jogador</div>

    <!-- Imagem do jogador -->
    <img
      id="foto-jogador"
      src="img_.svg"
      alt="Foto do jogador"
    />

    <div class="card-body">
      <ul class="list-unstyled mb-3">
        <li class="mb-2">
          <span class="info-label">Nome:</span>
          <span id="nome" class="placeholder-text">????????????????????</span>
        </li>
        <li class="mb-2">
          <span class="info-label">Nascimento:</span>
          <span id="nascimento" class="placeholder-text">??/??/????</span>
        </li>
        <li class="mb-2">
          <span class="info-label">Altura:</span>
          <span id="altura" class="placeholder-text">?.?? m</span>
        </li>
        <li class="mb-2">
          <span class="info-label">Posição:</span>
          <span id="posicao" class="placeholder-text">???????????</span>
        </li>
        <li class="mb-2">
          <span class="info-label">Rank:</span>
          <span id="rank" class="placeholder-text">??</span>
        </li>
      </ul>

      <!-- Botão que dispara a função revelar() -->
      <button class="btn-revelar" onclick="revelar()">Revelar</button>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- Script externo -->
  <script src="script.js"></script>

</body>
</html>

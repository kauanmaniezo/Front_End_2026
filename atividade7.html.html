<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAIXA LIVRE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .topo {
            background-color: yellow;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            border: 4px solid blue;
            margin-bottom: 20px;
        }

        .painel {
            background: #e9ecef;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        
        .texto-white { color: white; }
    </style>
</head>

<body class="bg-primary bg-gradient">
    <div id="Alert" class="container mt-2"></div>

    <div class='container'>
        <div class="topo">CAIXA LIVRE</div>

        <div class="row">
            <div class="col-md-7">
                <h3 class="texto-white">SUA COMPRA 🛒💰</h3>
                <ul id="lista" class="list-group">
                    </ul>
            </div>

            <div class="col-md-5">
                <div class="painel h3"> 
                    TOTAL: R$ <span id="total">0.00</span>
                </div>

                <div class="painel">
                    <label class="fw-bold">CÓDIGO DE BARRAS:</label>
                    <input type="text" id="cod" class="form-control form-control-lg" onkeypress="if(event.key==='Enter') addProduto()">
                </div>

                <div class="painel">
                    <label class="fw-bold">QUANTIDADE:</label>
                    <input type="number" id="qtd" class="form-control" value="1">
                </div>

                <div class="painel">
                    <label class="fw-bold">ÚLTIMO ITEM:</label>
                    <div class="alert alert-light m-0" role="alert">
                        <span id="qtdXun">Aguardando bip...</span>
                    </div>
                </div>
                
                <button class="btn btn-warning w-100 mt-2 fw-bold" onclick="addProduto()">ADICIONAR (ENTER)</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

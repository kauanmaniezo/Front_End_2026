<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Média Escolar</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1c1917;
      --surface:   #28241f;
      --border:    #3a3530;
      --text:      #f2ede7;
      --muted:     #7a7268;
      --subtle:    #403b35;

      --blue:      #60a5fa;
      --blue-bg:   rgba(96,165,250,0.08);
      --blue-brd:  rgba(96,165,250,0.2);

      --green:     #34d399;
      --green-bg:  rgba(52,211,153,0.08);
      --green-brd: rgba(52,211,153,0.2);

      --red:       #f87171;
      --red-bg:    rgba(248,113,113,0.08);
      --red-brd:   rgba(248,113,113,0.2);

      --gold:      #fbbf24;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* Subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.6;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 480px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }

    /* Top ornament */
    .ornament {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .grade-circle {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--gold);
      flex-shrink: 0;
      background: var(--subtle);
    }

    .ornament-text .eyebrow {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .ornament-text h1 {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 1.3rem;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .body {
      padding: 1.8rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    /* Field */
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.98rem;
      padding: 0.65rem 0.9rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
    }

    input::placeholder { color: #4a4540; }

    input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(251,191,36,0.1);
    }

    /* Notes row */
    .notes-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.7rem;
    }

    .note-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .note-field label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .note-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px; height: 16px;
      background: var(--subtle);
      border-radius: 3px;
      font-size: 0.55rem;
      color: var(--gold);
      font-weight: 600;
    }

    input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0.7rem 0.5rem;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.2rem 0;
    }

    /* Button */
    .btn {
      background: var(--gold);
      color: #1c1410;
      border: none;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      padding: 0.8rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      width: 100%;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }

    /* ── Result panel ── */
    .result {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.4s ease, opacity 0.3s ease;
    }

    .result.show {
      max-height: 300px;
      opacity: 1;
    }

    .result-inner {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem 1.8rem;
    }

    /* Student name */
    .student-name {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .student-name strong {
      font-style: normal;
      font-weight: 600;
      color: var(--text);
    }

    /* Score display */
    .score-row {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .score-value {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 3.2rem;
      line-height: 1;
      transition: color 0.3s;
    }

    .score-denom {
      font-family: 'Fraunces', serif;
      font-size: 1.2rem;
      color: var(--muted);
      padding-bottom: 0.4rem;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1rem;
      border-radius: 6px;
      border: 1px solid transparent;
      width: 100%;
      transition: background 0.3s, border-color 0.3s;
    }

    .status-badge .status-icon {
      font-size: 1.2rem;
      line-height: 1;
    }

    .status-badge .status-text {
      flex: 1;
    }

    .status-badge .status-title {
      font-weight: 600;
      font-size: 0.95rem;
      display: block;
    }

    .status-badge .status-sub {
      font-size: 0.72rem;
      opacity: 0.75;
      display: block;
      margin-top: 0.1rem;
    }

    .status-badge.approved {
      background: var(--blue-bg);
      border-color: var(--blue-brd);
      color: var(--blue);
    }

    .status-badge.exam {
      background: var(--green-bg);
      border-color: var(--green-brd);
      color: var(--green);
    }

    .status-badge.failed {
      background: var(--red-bg);
      border-color: var(--red-brd);
      color: var(--red);
    }

    /* Progress bar */
    .progress-wrap {
      margin-top: 1rem;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .progress-track {
      height: 5px;
      background: var(--subtle);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s;
      width: 0%;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Header ornament -->
    <div class="ornament">
      <div class="grade-circle">A</div>
      <div class="ornament-text">
        <div class="eyebrow">Exercício 03</div>
        <h1>Média Escolar</h1>
      </div>
    </div>

    <!-- Form -->
    <div class="body">

      <div class="field">
        <label for="nome">Nome do aluno</label>
        <input type="text" id="nome" placeholder="Ex.: Maria Silva" autocomplete="off" />
      </div>

      <div>
        <label style="display:block; margin-bottom:0.6rem">Notas</label>
        <div class="notes-row">
          <div class="note-field">
            <label><span class="note-badge">N1</span> Nota 1</label>
            <input type="number" id="n1" min="0" max="10" step="0.1" placeholder="0.0" />
          </div>
          <div class="note-field">
            <label><span class="note-badge">N2</span> Nota 2</label>
            <input type="number" id="n2" min="0" max="10" step="0.1" placeholder="0.0" />
          </div>
          <div class="note-field">
            <label><span class="note-badge">N3</span> Nota 3</label>
            <input type="number" id="n3" min="0" max="10" step="0.1" placeholder="0.0" />
          </div>
        </div>
      </div>

      <hr class="divider">

      <button class="btn" id="btn-calcular">Calcular Média</button>
    </div>

    <!-- Result panel -->
    <div class="result" id="result">
      <div class="result-inner">
        <p class="student-name">Resultado de <strong id="res-nome">—</strong></p>

        <div class="score-row">
          <span class="score-value" id="res-media">—</span>
          <span class="score-denom">/ 10</span>
        </div>

        <div class="status-badge" id="res-badge">
          <span class="status-icon" id="res-icon"></span>
          <div class="status-text">
            <span class="status-title" id="res-title"></span>
            <span class="status-sub" id="res-sub"></span>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-label">
            <span>0</span>
            <span id="prog-label">10</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const btn = document.getElementById('btn-calcular');

    btn.addEventListener('click', calcular);

    // Allow Enter key on any input
    document.querySelectorAll('input').forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') calcular(); });
    });

    function calcular() {
      const nome = document.getElementById('nome').value.trim() || 'Aluno';
      const n1   = Number(document.getElementById('n1').value);
      const n2   = Number(document.getElementById('n2').value);
      const n3   = Number(document.getElementById('n3').value);

      // Validate inputs
      const inputs = [
        document.getElementById('n1'),
        document.getElementById('n2'),
        document.getElementById('n3')
      ];
      let valid = true;
      inputs.forEach(inp => {
        const v = Number(inp.value);
        if (inp.value === '' || isNaN(v) || v < 0 || v > 10) {
          inp.style.borderColor = 'var(--red)';
          valid = false;
        } else {
          inp.style.borderColor = '';
        }
      });
      if (!valid) return;

      const media = (n1 + n2 + n3) / 3;

      // DOM targets
      const resultEl   = document.getElementById('result');
      const mediaEl    = document.getElementById('res-media');
      const nomeEl     = document.getElementById('res-nome');
      const badge      = document.getElementById('res-badge');
      const iconEl     = document.getElementById('res-icon');
      const titleEl    = document.getElementById('res-title');
      const subEl      = document.getElementById('res-sub');
      const fill       = document.getElementById('progress-fill');
      const gradeCircle = document.querySelector('.grade-circle');

      // Reset animation
      resultEl.classList.remove('show');
      fill.style.width = '0%';

      nomeEl.textContent  = nome;
      mediaEl.textContent = media.toFixed(2);

      // Update grade circle letter
      let letra = 'F';
      if (media >= 9)       letra = 'A';
      else if (media >= 7)  letra = 'B';
      else if (media >= 4)  letra = 'C';
      gradeCircle.textContent = letra;

      // Clear previous state classes
      badge.classList.remove('approved', 'exam', 'failed');

      if (media >= 7.0) {
        badge.classList.add('approved');
        iconEl.textContent  = '🎓';
        titleEl.textContent = 'Aprovado';
        subEl.textContent   = `Excelente! Média ${media.toFixed(2)} — acima do mínimo de 7,00.`;
        mediaEl.style.color = 'var(--blue)';
        fill.style.background = 'var(--blue)';

      } else if (media >= 4.0) {
        const falta = 10 - media;
        badge.classList.add('exam');
        iconEl.textContent  = '📋';
        titleEl.textContent = 'Exame Final';
        subEl.textContent   = `Média ${media.toFixed(2)} — faltam ${falta.toFixed(2)} pontos para atingir 10,00.`;
        mediaEl.style.color = 'var(--green)';
        fill.style.background = 'var(--green)';

      } else {
        badge.classList.add('failed');
        iconEl.textContent  = '✗';
        titleEl.textContent = 'Reprovado';
        subEl.textContent   = `Média ${media.toFixed(2)} — abaixo do mínimo exigido de 4,00.`;
        mediaEl.style.color = 'var(--red)';
        fill.style.background = 'var(--red)';
      }

      // Show panel then animate bar
      void resultEl.offsetWidth;
      resultEl.classList.add('show');

      setTimeout(() => {
        fill.style.width = Math.min((media / 10) * 100, 100) + '%';
      }, 100);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Repositórios | Front End 2026</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            display: grid;
            gap: 15px;
        }

        .repo-link {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .repo-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .repo-link::after {
            content: '→';
            font-size: 1.2em;
        }

        footer {
            margin-top: 50px;
            font-size: 0.9em;
            color: #64748b;
        }
    </style>
</head>
<body>

    <header>
        <h1>Portfólio Front End 2026</h1>
        <p>Acesse abaixo as atividades desenvolvidas no repositório.</p>
    </header>

    <main class="container">
        <a href="https://kauanmaniezo.github.io/Front_End_2026/atividade1" class="repo-link">Atividade 1</a>
        <a href="https://kauanmaniezo.github.io/Front_End_2026/atividade2" class="repo-link">Atividade 2</a>
        <a href="https://kauanmaniezo.github.io/Front_End_2026/atividade3" class="repo-link">Atividade 3</a>
        <a href="https://kauanmaniezo.github.io/Front_End_2026/atividade4" class="repo-link">Atividade 4</a>
        <a href="https://kauanmaniezo.github.io/Front_End_2026/atividade5" class="repo-link">Atividade 5</a>
        <a href="https://kauanmaniezo.github.io/Front_End_2026/atividade6" class="repo-link">Atividade 6</a>
        <a href="https://kauanmaniezo.github.io/Front_End_2026/atividade7" class="repo-link">Atividade 7</a>
    </main>

    <footer>
        <p>Desenvolvido por Kauan Maniezo</p>
    </footer>

</body>
</html>
